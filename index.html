<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すごろくゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

h1{
margin-top:20px;
}

#board{
width:660px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(11,60px);
gap:5px;
}

.cell{
width:60px;
height:60px;
background:#ddd;
border:2px solid #aaa;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
position:relative;
}

.player{
width:20px;
height:20px;
background:red;
border-radius:50%;
position:absolute;
bottom:2px;
}

.goal{
background:gold;
}

.event{
background:#9ad0ff;
}

#info{
font-size:20px;
margin-top:20px;
}

button{
padding:10px 30px;
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🎲 人生ゲーム風すごろく</h1>

<div id="info">
位置: <span id="pos">0</span>　
お金: ¥<span id="money">1000</span>
</div>

<button onclick="rollDice()">サイコロを振る</button>

<div id="result"></div>

<div id="board"></div>

<script>

const board=document.getElementById("board")

const size=20

let position=0
let money=1000

let events={
3:-200,
5:300,
8:-500,
10:500,
14:-300,
17:1000
}

for(let i=0;i<size;i++){

let cell=document.createElement("div")
cell.className="cell"
cell.id="cell"+i

if(i==size-1){
cell.classList.add("goal")
cell.textContent="GOAL"
}
else if(events[i]){
cell.classList.add("event")
cell.textContent="EVENT"
}
else{
cell.textContent=i
}

board.appendChild(cell)

}

updatePlayer()

function rollDice(){

let dice=Math.floor(Math.random()*6)+1

position+=dice

if(position>=size-1){
position=size-1
}

let message="サイコロ: "+dice

if(events[position]){

let change=events[position]
money+=change

if(change>0){
message+=" / ボーナス +"+change
}else{
message+=" / 支払い "+change
}

}

updatePlayer()

document.getElementById("result").textContent=message

document.getElementById("pos").textContent=position
document.getElementById("money").textContent=money

if(position==size-1){

setTimeout(()=>{
alert("ゴール！最終所持金 ¥"+money)
location.reload()
},300)

}

}

function updatePlayer(){

document.querySelectorAll(".player").forEach(p=>p.remove())

let p=document.createElement("div")
p.className="player"

document.getElementById("cell"+position).appendChild(p)

}

</script>

</body>
</html>
