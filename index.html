<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スタジアム打撃ゲーム</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:linear-gradient(#4fa3ff,#87ceeb);
}

#scoreboard{
background:black;
color:#00ff00;
font-size:26px;
padding:10px;
}

#stadium{
width:900px;
margin:20px auto;
border:6px solid white;
border-radius:10px;
overflow:hidden;
}

#crowd{
height:80px;
background:repeating-linear-gradient(
45deg,#555,#555 10px,#777 10px,#777 20px
);
}

#field{
width:900px;
height:320px;
background:linear-gradient(#3fa34d,#2e8b57);
position:relative;
overflow:hidden;
}

#zone{
position:absolute;
left:420px;
top:100px;
width:80px;
height:120px;
border:3px dashed yellow;
}

#ball{
position:absolute;
left:880px;
top:170px;
width:20px;
height:20px;
background:white;
border-radius:50%;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff9800;
cursor:pointer;
}

button:hover{
background:#ffc107;
}

#result{
font-size:28px;
margin-top:15px;
font-weight:bold;
}

.homerun{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
color:red;
font-weight:bold;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0)}
70%{transform:translate(-50%,-50%) scale(1.4)}
100%{transform:translate(-50%,-50%) scale(1)}
}

</style>
</head>

<body>

<h1>⚾ スタジアム打撃ゲーム</h1>

<div id="scoreboard">
SCORE: <span id="points">0</span>
</div>

<div id="stadium">

<div id="crowd"></div>

<div id="field">
<div id="zone"></div>
<div id="ball"></div>
</div>

</div>

<button onclick="swing()">バットを振る！</button>

<div id="result">タイミングよく打て！</div>

<script>

let ball = document.getElementById("ball");
let field = document.getElementById("field");

let position = 880;
let speed = 6;
let points = 0;
let swinging = false;

let flyMode = false;
let vx = 0;
let vy = 0;
let gravity = 0.4;

function moveBall(){

if(flyMode){

let top = parseFloat(ball.style.top);
let scale = parseFloat(ball.dataset.scale || 1);

position += vx;
top += vy;
vy += gravity;

scale -= 0.01;

ball.style.left = position + "px";
ball.style.top = top + "px";
ball.style.transform = "scale(" + scale + ")";

ball.dataset.scale = scale;

if(top > 340 || scale <= 0.2){
resetBall();
}

}else{

position -= speed;

if(position < -20){
resetBall();
}

ball.style.left = position + "px";

}

requestAnimationFrame(moveBall);
}

moveBall();

function resetBall(){

position = 880;
ball.style.left = position + "px";
ball.style.top = "170px";
ball.style.transform = "scale(1)";
ball.dataset.scale = 1;

flyMode = false;
swinging = false;
vy = 0;

}

function showHomerun(){

let text = document.createElement("div");
text.className = "homerun";
text.textContent = "HOME RUN!!";

field.appendChild(text);

setTimeout(()=>{
text.remove();
},1000);

}

function hitBall(power){

flyMode = true;

vx = -power;
vy = -power/2;

}

function swing(){

if(swinging) return;

swinging = true;

let result="";

if(position>430 && position<490){

result="ホームラン！！ +4点";
points+=4;

hitBall(12);
showHomerun();

}
else if(position>400 && position<520){

result="ヒット！ +1点";
points+=1;

hitBall(8);

}
else if(position>360 && position<560){

result="ファール";

}
else{

result="空振り！";

}

document.getElementById("result").textContent=result;
document.getElementById("points").textContent=points;

}

</script>

</body>
</html>
