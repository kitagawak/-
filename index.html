<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイミング打撃ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:linear-gradient(#87ceeb,#3cb371);
overflow:hidden;
}

h1{
color:white;
}

#field{
margin:30px auto;
width:700px;
height:220px;
background:#2e8b57;
border:4px solid white;
position:relative;
overflow:hidden;
}

#zone{
position:absolute;
left:300px;
width:100px;
height:100%;
border:3px dashed yellow;
}

#ball{
position:absolute;
left:680px;
top:100px;
width:20px;
height:20px;
background:white;
border-radius:50%;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:orange;
cursor:pointer;
}

button:hover{
background:gold;
}

#result{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

#score{
font-size:22px;
margin-top:10px;
}

/* ホームラン演出 */

.homerunText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:red;
font-weight:bold;
animation:pop 1s ease;
pointer-events:none;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0)}
70%{transform:translate(-50%,-50%) scale(1.4)}
100%{transform:translate(-50%,-50%) scale(1)}
}

</style>
</head>

<body>

<h1>⚾ タイミング打撃ゲーム</h1>

<div id="score">
得点: <span id="points">0</span>
</div>

<div id="field">
<div id="zone"></div>
<div id="ball"></div>
</div>

<button onclick="swing()">バットを振る！</button>

<div id="result">タイミングよく打とう！</div>

<script>

let ball = document.getElementById("ball");
let field = document.getElementById("field");

let position = 680;
let speed = 5;
let points = 0;
let swinging = false;

let homerunMode = false;
let homerunVX = -6;
let homerunVY = -8;

function moveBall(){

if(homerunMode){

let top = parseFloat(ball.style.top || 100);

position += homerunVX;
top += homerunVY;
homerunVY += 0.3;

ball.style.left = position + "px";
ball.style.top = top + "px";

if(top > 250){
resetBall();
}

}else{

position -= speed;

if(position < -20){
resetBall();
}

ball.style.left = position + "px";

}

requestAnimationFrame(moveBall);
}

moveBall();

function resetBall(){

position = 680;
ball.style.left = position + "px";
ball.style.top = "100px";

homerunMode = false;
swinging = false;

}

function showHomerun(){

let text = document.createElement("div");
text.className = "homerunText";
text.textContent = "HOME RUN!!";

document.body.appendChild(text);

setTimeout(()=>{
text.remove();
},1000);

}

function swing(){

if(swinging) return;

swinging = true;

let result = "";

if(position > 310 && position < 390){

result = "ホームラン！！ +4点";
points += 4;

homerunMode = true;
homerunVX = -5;
homerunVY = -10;

showHomerun();

}
else if(position > 270 && position < 430){

result = "ヒット！ +1点";
points += 1;

}
else if(position > 230 && position < 470){

result = "ファール";

}
else{

result = "空振り！";

}

document.getElementById("result").textContent = result;
document.getElementById("points").textContent = points;

}

</script>

</body>
</html>
