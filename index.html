<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本格ミニパワプロ</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #cce7ff;
    margin: 0;
    padding: 0;
  }
  h1 { margin-top: 20px; }
  #gameArea {
    position: relative;
    width: 300px;
    height: 400px;
    margin: 20px auto;
    border: 2px solid #333;
    background: #87ceeb;
    overflow: hidden;
    border-radius: 10px;
  }
  #ball {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
    bottom: 20px;
    left: 140px;
  }
  #bat {
    position: absolute;
    width: 80px;
    height: 20px;
    background: brown;
    bottom: 0;
    left: 110px;
    transform-origin: left center;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
  }
  #result {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
    height: 24px;
  }
</style>
</head>
<body>
<h1>本格ミニパワプロ</h1>
<div id="gameArea">
  <div id="ball"></div>
  <div id="bat"></div>
</div>
<button id="swingBtn">スイング！</button>
<div id="result"></div>

<script>
const ball = document.getElementById("ball");
const bat = document.getElementById("bat");
const swingBtn = document.getElementById("swingBtn");
const resultDiv = document.getElementById("result");

const player = { power: 70 };
let ballInterval;
let ballX = 140, ballY = 350;
let swingPressed = false;

// 投球アニメーション（斜めに移動）
function pitchBall() {
  ballX = Math.random() * 200 + 50; // 横軌道をランダム
  ballY = 350;
  swingPressed = false;
  resultDiv.textContent = "";
  ball.style.left = ballX + "px";
  ball.style.bottom = ballY + "px";

  ballInterval = setInterval(() => {
    ballY -= 5; // 上から下に移動
    // 少し横に揺らす軌道
    ballX += Math.sin(ballY / 30) * 2;
    ball.style.left = ballX + "px";
    ball.style.bottom = ballY + "px";

    // ボールが下まで行ったらアウト
    if (ballY <= 20) {
      clearInterval(ballInterval);
      if (!swingPressed) {
        resultDiv.textContent = "アウト…😢";
      }
    }
  }, 20);
}

// スイング判定
function swingBat() {
  swingPressed = true;
  let angle = 0;
  const swingInterval = setInterval(() => {
    angle += 20;
    bat.style.transform = `rotate(${angle}deg)`;
    if (angle >= 90) {
      clearInterval(swingInterval);
      bat.style.transform = "rotate(0deg)";

      // ヒット判定（ボールのY座標が150～220の範囲なら当たり判定）
      if (ballY >= 150 && ballY <= 220) {
        const hitChance = player.power + Math.floor(Math.random() * 50);
        if (hitChance > 80) {
          resultDiv.textContent = "ホームラン！🔥";
        } else {
          resultDiv.textContent = "ヒット！⚾";
        }
      } else {
        resultDiv.textContent = "空振り…😢";
      }

      clearInterval(ballInterval); // ボールを止める
    }
  }, 30);
}

// ボタン押したら投球＋スイング判定
swingBtn.addEventListener("click", () => {
  swingBat();
});

// 自動で投球スタート
pitchBall();
</script>
</body>
</html>
