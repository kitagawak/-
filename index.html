<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リアル人生ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f4f4f4;
}

#board{
width:1000px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(10,90px);
gap:5px;
}

.cell{
width:90px;
height:90px;
background:#ddd;
border:2px solid #888;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
position:relative;
}

.goal{
background:gold;
}

.player{
width:24px;
height:24px;
background:red;
border-radius:50%;
position:absolute;
bottom:4px;
}

#info{
font-size:18px;
margin-top:10px;
}

button{
padding:12px 30px;
font-size:18px;
margin-top:10px;
}

#log{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🎲 リアル人生ゲーム</h1>

<div id="info">

位置: <span id="pos">0</span><br>

お金: ¥<span id="money">10000</span><br>

職業: <span id="job">なし</span><br>

給料: ¥<span id="salary">0</span><br>

結婚: <span id="married">していない</span><br>

子供: <span id="kids">0</span><br>

家: <span id="house">なし</span>

</div>

<button onclick="rollDice()">サイコロを振る</button>

<div id="log"></div>

<div id="board"></div>

<script>

const board=document.getElementById("board")

const size=80

let position=0
let money=10000
let job="なし"
let salary=0
let married=false
let kids=0
let house=false

for(let i=0;i<size;i++){

let cell=document.createElement("div")
cell.className="cell"
cell.id="cell"+i

if(i==size-1){
cell.classList.add("goal")
cell.textContent="GOAL"
}
else{
cell.textContent=i
}

board.appendChild(cell)

}

updatePlayer()

const jobs=[

{name:"会社員",salary:3000},
{name:"医者",salary:8000},
{name:"エンジニア",salary:5000},
{name:"スポーツ選手",salary:10000},
{name:"YouTuber",salary:7000}

]

const events=[

function(){

let j=jobs[Math.floor(Math.random()*jobs.length)]

job=j.name
salary=j.salary

return "💼 就職した → "+job+" (給料 "+salary+")"

},

function(){

money+=salary

return "💰 給料日！ +"+salary

},

function(){

if(!married){

married=true
return "💍 結婚した！"

}

return "特に何もなかった"

},

function(){

if(married){

kids++
return "👶 子供が生まれた！"

}

return "平和な一日"

},

function(){

if(!house && money>=20000){

money-=20000
house=true

return "🏠 家を購入 -20000"

}

return "家を見るだけだった"

},

function(){

let gain=2000+Math.floor(Math.random()*5000)

money+=gain

return "🎁 臨時収入 +"+gain

},

function(){

let loss=1000+Math.floor(Math.random()*4000)

money-=loss

return "💸 出費 -"+loss

},

function(){

let lottery=Math.random()

if(lottery<0.2){

money+=20000
return "🎰 宝くじ大当たり +20000"

}

return "宝くじは外れ"

}

]

function rollDice(){

let dice=Math.floor(Math.random()*6)+1

position+=dice

if(position>=size-1){
position=size-1
}

let event=events[Math.floor(Math.random()*events.length)]

let text="🎲 "+dice+"マス進んだ → "+event()

updatePlayer()

updateInfo()

document.getElementById("log").textContent=text

if(position==size-1){

setTimeout(()=>{

alert("ゴール！資産 ¥"+money)

location.reload()

},400)

}

}

function updatePlayer(){

document.querySelectorAll(".player").forEach(p=>p.remove())

let p=document.createElement("div")

p.className="player"

document.getElementById("cell"+position).appendChild(p)

}

function updateInfo(){

document.getElementById("pos").textContent=position
document.getElementById("money").textContent=money
document.getElementById("job").textContent=job
document.getElementById("salary").textContent=salary
document.getElementById("married").textContent=married?"している":"していない"
document.getElementById("kids").textContent=kids
document.getElementById("house").textContent=house?"あり":"なし"

}

</script>

</body>
</html>
