<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニパワプロ 打席シーン</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #cce7ff;
    margin: 0;
    padding: 0;
  }
  h1 { margin-top: 20px; }
  #gameArea {
    position: relative;
    width: 300px;
    height: 400px;
    margin: 20px auto;
    border: 2px solid #333;
    background: #87ceeb;
    overflow: hidden;
    border-radius: 10px;
  }
  #ball {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
    bottom: 20px;
    left: 140px;
  }
  #bat {
    position: absolute;
    width: 80px;
    height: 20px;
    background: brown;
    bottom: 0;
    left: 110px;
    transform-origin: left center;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
  }
  #result {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
    height: 24px;
  }
</style>
</head>
<body>
<h1>ミニパワプロ 打席シーン</h1>
<div id="gameArea">
  <div id="ball"></div>
  <div id="bat"></div>
</div>
<button id="swingBtn">スイング！</button>
<div id="result"></div>

<script>
const ball = document.getElementById("ball");
const bat = document.getElementById("bat");
const swingBtn = document.getElementById("swingBtn");
const resultDiv = document.getElementById("result");

// 選手能力
const player = {
  power: 70
};

// 投球アニメーション
function pitchBall() {
  let pos = 0; // 上から下に移動
  resultDiv.textContent = "";
  ball.style.bottom = "350px"; // 上からスタート
  const interval = setInterval(() => {
    pos += 5;
    ball.style.bottom = 350 - pos + "px";
    if (pos >= 350) {
      clearInterval(interval);
      resultDiv.textContent = "アウト…😢";
    }
  }, 20);
  return interval;
}

// スイング判定
function swingBat() {
  // バットを回すアニメーション
  let angle = 0;
  const swingInterval = setInterval(() => {
    angle += 20;
    bat.style.transform = `rotate(${angle}deg)`;
    if (angle >= 90) {
      clearInterval(swingInterval);
      bat.style.transform = "rotate(0deg)";
      // 打撃判定
      const hitChance = player.power + Math.floor(Math.random() * 50);
      if (hitChance > 80) {
        resultDiv.textContent = "ホームラン！🔥";
      } else if (hitChance > 50) {
        resultDiv.textContent = "ヒット！⚾";
      } else {
        resultDiv.textContent = "空振り…😢";
      }
    }
  }, 30);
}

// ボタン押したら投球＋スイング
swingBtn.addEventListener("click", () => {
  const ballInterval = pitchBall();
  setTimeout(() => {
    clearInterval(ballInterval); // ボールを止める
    swingBat();
  }, 1000); // 1秒後にスイング
});
</script>
</body>
</html>
