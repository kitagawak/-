<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リアル人生ゲーム（完全版）</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#eaf6ff;
}

#board{
width:1000px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(10,90px);
gap:5px;
}

.cell{
width:90px;
height:90px;
border:2px solid #555;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:11px;
position:relative;
}

.normal{background:#fff;}
.money{background:#a0e7a0;}
.event{background:#9ad0ff;}
.choice{background:#ffe08a;}
.bad{background:#ff9a9a;}
.goal{background:gold;}

.player{
width:20px;
height:20px;
background:red;
border-radius:50%;
position:absolute;
bottom:3px;
}

#roulette{
width:200px;
height:200px;
border-radius:50%;
border:8px solid #333;
margin:20px auto;
position:relative;
}

#pointer{
width:6px;
height:100px;
background:red;
position:absolute;
left:97px;
top:-50px;
}

button{
padding:10px 25px;
margin:10px;
}

#choiceBox{
margin-top:10px;
}

.choiceBtn{
padding:8px 15px;
margin:5px;
}

</style>
</head>

<body>

<h1>🎡 リアル人生ゲーム（完全版）</h1>

<div>
位置: <span id="pos">0</span>　
お金: ¥<span id="money">10000</span>　
職業: <span id="job">なし</span>
</div>

<div id="roulette">
<div id="pointer"></div>
</div>

<button onclick="spin()">ルーレット</button>

<div id="choiceBox"></div>
<div id="log"></div>

<div id="board"></div>

<script>

// ===== 基本 =====
const board = document.getElementById("board");
const size = 80;

let pos = 0;
let money = 10000;
let job = "なし";
let salary = 0;

// ===== マス構造（分岐あり） =====
const routeMap = {};
for(let i=0;i<size;i++){
routeMap[i] = [i+1];
}

// ★ 本物の分岐（ルートが分かれる）
routeMap[10] = [11,15];
routeMap[30] = [31,35];
routeMap[50] = [51,55];
routeMap[70] = [71,75];

// ===== マス種類 =====
function getType(i){
if(i==79) return "goal";
if([10,30,50,70].includes(i)) return "choice";
if(i%7==0) return "money";
if(i%5==0) return "event";
if(i%9==0) return "bad";
return "normal";
}

// ===== マス生成 =====
for(let i=0;i<size;i++){

let type = getType(i);

let cell = document.createElement("div");
cell.className = "cell "+type;
cell.id = "cell"+i;

let icon = "⬜";

if(type=="money") icon="💰";
if(type=="event") icon="🎲";
if(type=="choice") icon="🛣";
if(type=="bad") icon="💸";
if(type=="goal") icon="🏁";

cell.innerHTML = icon+"<br>"+i;

board.appendChild(cell);
}

updatePlayer();

// ===== ルーレット =====
let spinning=false;

function spin(){

if(spinning) return;
spinning=true;

let pointer=document.getElementById("pointer");

let steps = Math.floor(Math.random()*6)+1;
let total = 360*4 + steps*60;

pointer.style.transition="transform 2s ease-out";
pointer.style.transform="rotate("+total+"deg)";

setTimeout(()=>{
spinning=false;
move(steps);
},2000);

}

// ===== 移動 =====
function move(step){

let next = pos + step;

if(next>=79) next=79;

// 分岐チェック
if(routeMap[next].length>1){
showChoice(routeMap[next]);
} else {
pos = routeMap[next][0];
afterMove();
}

}

// ===== 分岐UI =====
function showChoice(options){

let box = document.getElementById("choiceBox");
box.innerHTML = "<b>どっちに進む？</b><br>";

options.forEach(o=>{
let btn=document.createElement("button");
btn.className="choiceBtn";
btn.textContent="➡ "+o+"へ";
btn.onclick=()=>{
pos=o;
box.innerHTML="";
afterMove();
};
box.appendChild(btn);
});

}

// ===== イベント =====
function afterMove(){

let type = getType(pos);
let text="";

if(type=="money"){
money+=3000;
text="💰 ボーナス +3000";
}
else if(type=="bad"){
money-=2000;
text="💸 出費 -2000";
}
else if(type=="event"){
if(job=="なし"){
job="会社員";
salary=3000;
text="💼 就職した！";
}else{
money+=salary;
text="💰 給料 +"+salary;
}
}
else if(type=="choice"){
text="分岐を通過";
}
else if(type=="goal"){
text="🏁 ゴール！";
alert("資産 ¥"+money);
location.reload();
}
else{
text="のんびり進んだ";
}

document.getElementById("log").textContent=text;

updatePlayer();
updateInfo();

}

// ===== 表示更新 =====
function updatePlayer(){
document.querySelectorAll(".player").forEach(p=>p.remove());
let p=document.createElement("div");
p.className="player";
document.getElementById("cell"+pos).appendChild(p);
}

function updateInfo(){
document.getElementById("pos").textContent=pos;
document.getElementById("money").textContent=money;
document.getElementById("job").textContent=job;
}

</script>

</body>
</html>
